<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFA - Plateforme de Recrutement Professionnel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        
        .loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        
        .loader {
            text-align: center;
        }
        
        .loader-text {
            color: white;
            font-size: 28px;
            font-weight: 700;
            margin-top: 20px;
        }
        
        .loader-dots {
            display: inline-block;
            width: 60px;
            text-align: left;
        }
        
        .loader-dots::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
            display: inline-block;
            width: 0;
            overflow: hidden;
        }
        
        @keyframes dots {
            0%,
            20% {
                width: 0;
            }
            40% {
                width: 0.5em;
            }
            60% {
                width: 1em;
            }
            80%,
            100% {
                width: 1.5em;
            }
        }
        
        .card-pro {
            background: white;
            border-radius: 20px;
            transition: all 0.3s;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        
        .card-pro:hover {
            transform: translateY(-5px);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-secondary {
            background: white;
            color: #667eea;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            border: 2px solid #667eea;
            cursor: pointer;
        }
        
        .input-modern {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 16px;
            width: 100%;
            transition: all 0.3s;
        }
        
        .input-modern:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .hero-gradient {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 30px;
            padding: 60px;
            text-align: center;
            color: white;
        }
        
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        .dashboard-sidebar {
            background: white;
            border-radius: 20px;
            padding: 20px;
        }
        
        .dashboard-main {
            background: white;
            border-radius: 20px;
            padding: 30px;
        }
        
        .form-section {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-recu {
            background: #e0f2fe;
            color: #0284c7;
        }
        
        .status-etude {
            background: #fef3c7;
            color: #d97706;
        }
        
        .status-preselection {
            background: #dcfce7;
            color: #16a34a;
        }
        
        .status-entretien {
            background: #f3e8ff;
            color: #9333ea;
        }
        
        .status-retenu {
            background: #dcfce7;
            color: #16a34a;
        }
        
        .status-non-retenu {
            background: #fee2e2;
            color: #dc2626;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
    </style>
</head>

<body>
    <div class="loader-wrapper" id="loaderWrapper">
        <div class="loader">
            <div style="width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto;">
                <img src="afa.png" alt="Logo" style="height:60px;">
            </div>
            <div class="loader-text">Afa<span class="loader-dots"></span></div>
            <p style="color: rgba(255,255,255,0.8); margin-top: 15px;">Plateforme de recrutement professionnel</p>
        </div>
    </div>

    <div id="appContent" style="display: none;">
        <nav class="bg-white shadow-lg sticky top-0 z-50">
            <div class="container mx-auto px-4">
                <div class="flex justify-between items-center py-4">
                    <div class="flex items-center space-x-3 cursor-pointer" onclick="showHome()">
                        <div style="width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;">
                            <img src="afa.png" alt="Logo" style="height:60px;">
                        </div>
                        <span class="font-bold text-2xl text-gray-800">AFA</span>
                    </div>
                    <div class="hidden md:flex space-x-4">
                        <button onclick="showHome()" class="text-gray-600 hover:text-purple-600 px-4 py-2">Accueil</button>
                        <button onclick="showLogin('candidat')" class="text-gray-600 hover:text-purple-600 px-4 py-2">Espace Candidat</button>
                        <button onclick="showLogin('entreprise')" class="text-gray-600 hover:text-purple-600 px-4 py-2">Espace Entreprise</button>
                        <button onclick="showLogin('admin')" class="text-gray-600 hover:text-purple-600 px-4 py-2">Administrateur</button>
                    </div>
                </div>
            </div>
        </nav>
        <div id="mainContent" class="container mx-auto px-4 py-8"></div>
    </div>

    <script>
        // ====================================================
        // CONFIGURATION SUPABASE
        // ====================================================
        // !!! REMPLACEZ CES VALEURS PAR LES VOTRES !!!
        const SUPABASE_URL = 'https://ubeaidhmtkivrpnkqsnt.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_SMqeBYqnHCjrQGO2_rfTJA_JvkumJXQ';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ====================================================
        // VARIABLES GLOBALES
        // ====================================================
        let currentUser = null;
        let currentUserType = null;

        // Chargement de la page
        setTimeout(() => {
            const loader = document.getElementById('loaderWrapper');
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
                showHome();
            }, 800);
        }, 1000);

        // Vérifier session existante
        async function checkSession() {
            const session = localStorage.getItem('currentSession');
            if (session) {
                const data = JSON.parse(session);
                currentUser = data.user;
                currentUserType = data.type;
                if (data.type === 'candidat') {
                    showCandidatDashboard();
                } else if (data.type === 'entreprise') {
                    showEntrepriseDashboard();
                } else if (data.type === 'admin') {
                    showAdminDashboard();
                } else {
                    showHome();
                }
                return true;
            }
            return false;
        }

        // ====================================================
        // AFFICHAGE ACCUEIL
        // ====================================================
        async function showHome() {
            // Compter les candidats, entreprises et offres depuis Supabase
            let candidatsCount = 0;
            let entreprisesCount = 0;
            let offresCount = 0;

            try {
                const {
                    count: cCount
                } = await supabaseClient.from('candidats').select('*', {
                    count: 'exact',
                    head: true
                });
                candidatsCount = cCount || 0;

                const {
                    count: eCount
                } = await supabaseClient.from('entreprises').select('*', {
                    count: 'exact',
                    head: true
                });
                entreprisesCount = eCount || 0;

                const {
                    count: oCount
                } = await supabaseClient.from('offres').select('*', {
                    count: 'exact',
                    head: true
                }).eq('status', 'active');
                offresCount = oCount || 0;
            } catch (error) {
                console.error('Erreur chargement stats:', error);
            }

            const html = `
                <div class="fade-in">
                    <div class="hero-gradient mb-16">
                        <h1 class="text-5xl md:text-6xl font-bold mb-4">Plateforme de Recrutement</h1>
                        <p class="text-xl md:text-2xl mb-8">La solution complète pour l'emploi et le recrutement professionnel</p>
                        <div class="flex justify-center gap-4 flex-wrap">
                            <button onclick="showLogin('candidat')" class="bg-white text-purple-600 px-8 py-3 rounded-full font-semibold hover:shadow-lg">Je cherche un emploi</button>
                            <button onclick="showLogin('entreprise')" class="bg-purple-700 text-white px-8 py-3 rounded-full font-semibold hover:bg-purple-800">Je recrute</button>
                        </div>
                    </div>
                    <div class="grid md:grid-cols-3 gap-8 mb-16">
                        <div class="stat-card" onclick="showLogin('candidat')">
                            <i class="fas fa-users text-4xl text-purple-600 mb-3"></i>
                            <div class="text-3xl font-bold">${candidatsCount}</div>
                            <div class="text-gray-600">Candidats inscrits</div>
                        </div>
                        <div class="stat-card" onclick="showLogin('entreprise')">
                            <i class="fas fa-building text-4xl text-purple-600 mb-3"></i>
                            <div class="text-3xl font-bold">${entreprisesCount}</div>
                            <div class="text-gray-600">Entreprises partenaires</div>
                        </div>
                        <div class="stat-card" onclick="showLogin('entreprise')">
                            <i class="fas fa-briefcase text-4xl text-purple-600 mb-3"></i>
                            <div class="text-3xl font-bold">${offresCount}</div>
                            <div class="text-gray-600">Offres d'emploi</div>
                        </div>
                    </div>
                    <h2 class="text-3xl font-bold text-center mb-12">Nos services</h2>
                    <div class="grid md:grid-cols-3 gap-8">
                        <div class="card-pro p-8 text-center cursor-pointer" onclick="showLogin('candidat')">
                            <div class="w-20 h-20 bg-gradient-to-r from-blue-500 to-purple-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                <i class="fas fa-user-graduate text-white text-3xl"></i>
                            </div>
                            <h3 class="text-2xl font-bold mb-3">Espace Candidat</h3>
                            <p class="text-gray-600">Créez votre CV professionnel, postulez aux offres et suivez vos candidatures</p>
                        </div>
                        <div class="card-pro p-8 text-center cursor-pointer" onclick="showLogin('entreprise')">
                            <div class="w-20 h-20 bg-gradient-to-r from-green-500 to-teal-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                <i class="fas fa-chart-line text-white text-3xl"></i>
                            </div>
                            <h3 class="text-2xl font-bold mb-3">Espace Entreprise</h3>
                            <p class="text-gray-600">Publiez vos offres, trouvez les meilleurs talents et gérez vos recrutements</p>
                        </div>
                        <div class="card-pro p-8 text-center cursor-pointer" onclick="showLogin('admin')">
                            <div class="w-20 h-20 bg-gradient-to-r from-purple-500 to-pink-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                <i class="fas fa-chart-pie text-white text-3xl"></i>
                            </div>
                            <h3 class="text-2xl font-bold mb-3">Espace Admin</h3>
                            <p class="text-gray-600">Gérez l'ensemble de la plateforme</p>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('mainContent').innerHTML = html;
        }

        // ====================================================
        // CONNEXION
        // ====================================================
        function showLogin(type) {
            const html = `
                <div class="max-w-md mx-auto fade-in">
                    <div class="card-pro p-8">
                        <div class="text-center mb-8">
                            <div class="text-5xl mb-4">${type === 'candidat' ? '👤' : type === 'entreprise' ? '🏢' : '👑'}</div>
                            <h2 class="text-3xl font-bold">Connexion</h2>
                            <p class="text-gray-600 mt-2">Espace ${type === 'candidat' ? 'Candidat' : type === 'entreprise' ? 'Entreprise' : 'Administrateur'}</p>
                        </div>
                        <form onsubmit="handleLogin(event, '${type}')">
                            <div class="mb-4">
                                <label class="block text-gray-700 mb-2">${type === 'candidat' ? 'Téléphone' : 'Email'}</label>
                                <input type="${type === 'candidat' ? 'tel' : 'email'}" id="loginIdentifier" required class="input-modern" placeholder="${type === 'candidat' ? '06XXXXXXXX' : 'votre@email.com'}">
                            </div>
                            <div class="mb-6">
                                <label class="block text-gray-700 mb-2">Mot de passe</label>
                                <input type="password" id="loginPassword" required class="input-modern" placeholder="••••••••">
                            </div>
                            <button type="submit" class="btn-primary w-full">Se connecter</button>
                        </form>
                        <div class="mt-4 text-center">
                            <button onclick="showRegister('${type}')" class="text-purple-600 hover:underline">Pas encore de compte ? S'inscrire</button>
                        </div>
                        <button onclick="showHome()" class="mt-4 text-gray-500 hover:text-gray-700 text-sm w-full">← Retour à l'accueil</button>
                    </div>
                </div>
            `;
            document.getElementById('mainContent').innerHTML = html;
        }

        async function handleLogin(event, type) {
            event.preventDefault();
            const identifier = document.getElementById('loginIdentifier').value;
            const password = document.getElementById('loginPassword').value;

            if (type === 'admin') {
                if (identifier === 'admin@octogo.com' && password === 'admin123') {
                    currentUser = {
                        nom: 'Administrateur',
                        email: identifier
                    };
                    currentUserType = 'admin';
                    localStorage.setItem('currentSession', JSON.stringify({
                        user: currentUser,
                        type: 'admin'
                    }));
                    showAdminDashboard();
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Erreur',
                        text: 'Identifiants administrateur incorrects'
                    });
                }
            } else if (type === 'candidat') {
                const {
                    data,
                    error
                } = await supabaseClient
                    .from('candidats')
                    .select('*')
                    .eq('telephone', identifier)
                    .eq('mot_de_passe', password);

                if (error) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Erreur',
                        text: error.message
                    });
                } else if (data && data.length > 0) {
                    currentUser = data[0];
                    currentUserType = 'candidat';
                    localStorage.setItem('currentSession', JSON.stringify({
                        user: currentUser,
                        type: 'candidat'
                    }));
                    showCandidatDashboard();
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Erreur',
                        text: 'Téléphone ou mot de passe incorrect'
                    });
                }
            } else if (type === 'entreprise') {
                const {
                    data,
                    error
                } = await supabaseClient
                    .from('entreprises')
                    .select('*')
                    .eq('email', identifier)
                    .eq('mot_de_passe', password);

                if (error) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Erreur',
                        text: error.message
                    });
                } else if (data && data.length > 0) {
                    currentUser = data[0];
                    currentUserType = 'entreprise';
                    localStorage.setItem('currentSession', JSON.stringify({
                        user: currentUser,
                        type: 'entreprise'
                    }));
                    showEntrepriseDashboard();
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Erreur',
                        text: 'Email ou mot de passe incorrect'
                    });
                }
            }
        }

        // ====================================================
        // INSCRIPTION CANDIDAT (sans email)
        // ====================================================
        function showRegister(type) {
            if (type === 'candidat') {
                showRegisterCandidat();
            } else if (type === 'entreprise') {
                showRegisterEntreprise();
            } else {
                Swal.fire('Info', 'Contactez le support pour créer un compte administrateur', 'info');
            }
        }

        function showRegisterCandidat() {
            const html = `
        <div class="max-w-5xl mx-auto fade-in">
            <div class="card-pro p-8">
                <h2 class="text-3xl font-bold text-center mb-6">Inscription Candidat</h2>
                <form onsubmit="registerCandidat(event)" enctype="multipart/form-data">
                    <div class="form-section">
                        <h3 class="text-xl font-bold mb-4 text-purple-600"><i class="fas fa-user-circle mr-2"></i>Informations personnelles</h3>
                        <div class="grid md:grid-cols-2 gap-4">
                            <div><label class="block text-gray-700 mb-2">Nom *</label><input type="text" id="nom" required class="input-modern"></div>
                            <div><label class="block text-gray-700 mb-2">Prénom *</label><input type="text" id="prenom" required class="input-modern"></div>
                            <div><label class="block text-gray-700 mb-2">Date de naissance</label><input type="date" id="dateNaissance" class="input-modern"></div>
                            <div><label class="block text-gray-700 mb-2">Téléphone *</label><input type="tel" id="telephone" required class="input-modern"></div>
                            <div><label class="block text-gray-700 mb-2">Mot de passe *</label><input type="password" id="password" required class="input-modern"></div>
                            <div><label class="block text-gray-700 mb-2">Adresse</label><input type="text" id="adresse" class="input-modern"></div>
                            <div><label class="block text-gray-700 mb-2">Ville</label><input type="text" id="ville" class="input-modern"></div>
                            <div><label class="block text-gray-700 mb-2">Région</label><input type="text" id="region" class="input-modern"></div>
                            <div><label class="block text-gray-700 mb-2">Situation familiale</label>
                                <select id="situationFamiliale" class="input-modern">
                                    <option value="">Sélectionner</option>
                                    <option>Célibataire</option><option>Marié(e)</option><option>Divorcé(e)</option><option>Veuf/veuve</option>
                                </select>
                            </div>
                            <div><label class="block text-gray-700 mb-2">Niveau d'étude</label>
                                <select id="niveauEtude" class="input-modern">
                                    <option value="">Sélectionner</option>
                                    <option>Sans diplôme</option><option>Bac</option><option>Bac+2</option><option>Bac+3</option><option>Bac+5</option><option>Doctorat</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-section">
                        <h3 class="text-xl font-bold mb-4 text-purple-600"><i class="fas fa-briefcase mr-2"></i>Données professionnelles</h3>
                        <div class="grid md:grid-cols-2 gap-4">
                            <div><label class="block text-gray-700 mb-2">Métier recherché *</label><input type="text" id="metierRecherche" required class="input-modern"></div>
                            <div><label class="block text-gray-700 mb-2">Secteur</label>
                                <select id="secteur" class="input-modern">
                                    <option value="">Sélectionner</option>
                                    <option>Industrie</option><option>Service</option><option>Logistique</option><option>Hôtellerie</option>
                                    <option>Sécurité</option><option>Nettoyage</option><option>Restauration</option>
                                </select>
                            </div>
                            <div><label class="block text-gray-700 mb-2">Expériences professionnelles</label><textarea id="experiences" rows="3" class="input-modern" placeholder="Décrivez vos expériences..."></textarea></div>
                            <div><label class="block text-gray-700 mb-2">Compétences</label><textarea id="competences" rows="3" class="input-modern" placeholder="Listez vos compétences..."></textarea></div>
                            <div><label class="block text-gray-700 mb-2">Permis de conduire</label>
                                <select id="permisConduire" class="input-modern">
                                    <option value="false">Non</option><option value="true">Oui</option>
                                </select>
                            </div>
                            <div><label class="block text-gray-700 mb-2">Disponibilité</label>
                                <select id="disponibilite" class="input-modern">
                                    <option>Immédiate</option><option>1 semaine</option><option>2 semaines</option><option>1 mois</option>
                                </select>
                            </div>
                            <div><label class="block text-gray-700 mb-2">Mobilité géographique</label>
                                <select id="mobilite" class="input-modern">
                                    <option value="false">Non</option><option value="true">Oui</option>
                                </select>
                            </div>
                            <div><label class="block text-gray-700 mb-2">Salaire souhaité (TND)</label><input type="number" id="salaireSouhaite" class="input-modern"></div>
                        </div>
                    </div>
                    
                    <!-- NOUVELLE SECTION: DOCUMENTS -->
                    <div class="form-section">
                        <h3 class="text-xl font-bold mb-4 text-purple-600"><i class="fas fa-file-alt mr-2"></i>Documents</h3>
                        <div class="grid md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-gray-700 mb-2">CV (PDF ou Word)</label>
                                <input type="file" id="cvFile" accept=".pdf,.doc,.docx" class="input-modern">
                                <p class="text-xs text-gray-500 mt-1">Format accepté: PDF, DOC, DOCX (Max 5MB)</p>
                            </div>
                            <div>
                                <label class="block text-gray-700 mb-2">Photo de profil</label>
                                <input type="file" id="photoFile" accept="image/*" class="input-modern">
                                <p class="text-xs text-gray-500 mt-1">Format accepté: JPG, PNG (Max 2MB)</p>
                            </div>
                            <div>
                                <label class="block text-gray-700 mb-2">Carte d'identité</label>
                                <input type="file" id="carteIdentiteFile" accept=".pdf,.jpg,.png" class="input-modern">
                                <p class="text-xs text-gray-500 mt-1">Format accepté: PDF, JPG, PNG (Max 2MB)</p>
                            </div>
                            <div>
                                <label class="block text-gray-700 mb-2">Diplômes</label>
                                <input type="file" id="diplomesFile" accept=".pdf,.jpg,.png" class="input-modern">
                                <p class="text-xs text-gray-500 mt-1">Format accepté: PDF, JPG, PNG (Max 5MB)</p>
                            </div>
                            <div>
                                <label class="block text-gray-700 mb-2">Certificats</label>

        async function registerCandidat(event) {
            event.preventDefault();

            // Afficher un loader
            Swal.fire({
                title: 'Inscription en cours...',
                text: 'Veuillez patienter',
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });

            try {
                // Fonction pour uploader un fichier vers Supabase Storage
                async function uploadFile(file, folder, fileName) {
                    if (!file || file.size === 0) return null;

                    const fileExt = file.name.split('.').pop();
                    const filePath = `${folder}/${fileName}_${Date.now()}.${fileExt}`;

                    const {
                        data,
                        error
                    } = await supabaseClient.storage
                        .from('candidat-documents')
                        .upload(filePath, file);

                    if (error) {
                        console.error('Erreur upload:', error);
                        return null;
                    }

                    // Récupérer l'URL publique
                    const {
                        data: publicUrl
                    } = supabaseClient.storage
                        .from('candidat-documents')
                        .getPublicUrl(filePath);

                    return publicUrl.publicUrl;
                }

                // Générer un ID unique pour les fichiers
                const userPhone = document.getElementById('telephone').value;

                // Upload des fichiers
                const cvFile = document.getElementById('cvFile').files[0];
                const photoFile = document.getElementById('photoFile').files[0];
                const carteFile = document.getElementById('carteIdentiteFile').files[0];
                const diplomesFile = document.getElementById('diplomesFile').files[0];
                const certificatsFile = document.getElementById('certificatsFile').files[0];
                const attestationsFile = document.getElementById('attestationsFile').files[0];

                const [cvUrl, photoUrl, carteUrl, diplomesUrl, certificatsUrl, attestationsUrl] = await Promise.all([
                    uploadFile(cvFile, 'cv', userPhone),
                    uploadFile(photoFile, 'photos', userPhone),
                    uploadFile(carteFile, 'cartes', userPhone),
                    uploadFile(diplomesFile, 'diplomes', userPhone),
                    uploadFile(certificatsFile, 'certificats', userPhone),
                    uploadFile(attestationsFile, 'attestations', userPhone)
                ]);

                const candidatData = {
                    nom: document.getElementById('nom').value,
                    prenom: document.getElementById('prenom').value,
                    date_naissance: document.getElementById('dateNaissance').value || null,
                    telephone: document.getElementById('telephone').value,
                    mot_de_passe: document.getElementById('password').value,
                    adresse: document.getElementById('adresse').value,
                    ville: document.getElementById('ville').value,
                    region: document.getElementById('region').value,
                    situation_familiale: document.getElementById('situationFamiliale').value,
                    niveau_etude: document.getElementById('niveauEtude').value,
                    metier_recherche: document.getElementById('metierRecherche').value,
                    secteur: document.getElementById('secteur').value,
                    experiences: document.getElementById('experiences').value,
                    competences: document.getElementById('competences').value,
                    permis_conduire: document.getElementById('permisConduire').value === 'true',
                    disponibilite: document.getElementById('disponibilite').value,
                    mobilite_geographique: document.getElementById('mobilite').value === 'true',
                    salaire_souhaite: document.getElementById('salaireSouhaite').value || null,
                    // URLs des documents
                    cv_url: cvUrl,
                    photo_url: photoUrl,
                    carte_identite_url: carteUrl,
                    diplomes_url: diplomesUrl,
                    certificats_url: certificatsUrl,
                    attestations_url: attestationsUrl,
                    status: 'actif',
                    created_at: new Date(),
                    updated_at: new Date()
                };

                const {
                    data,
                    error
                } = await supabaseClient
                    .from('candidats')
                    .insert([candidatData])
                    .select();

                if (error) {
                    throw error;
                }

                Swal.fire({
                    icon: 'success',
                    title: 'Inscription réussie !',
                    text: 'Votre profil a été créé avec succès',
                    confirmButtonColor: '#667eea'
                }).then(() => showLogin('candidat'));

            } catch (error) {
                console.error('Erreur:', error);
                Swal.fire({
                    icon: 'error',
                    title: 'Erreur',
                    text: error.message || 'Une erreur est survenue lors de l\'inscription'
                });
            }
        }

                                    <i class="fas fa-inbox w-6 text-purple-600"></i> Candidatures reçues
                                </button>
                                <button onclick="logout()" class="w-full text-left px-4 py-3 rounded-lg hover:bg-red-50 text-red-600 flex items-center">
                                    <i class="fas fa-sign-out-alt w-6"></i> Déconnexion
                                </button>
                            </nav>
                        </div>
                    </div>
                    <div class="flex-1">
                        <div class="dashboard-main" id="dashboardContent">
                            <div class="text-center mb-8">
                                <i class="fas fa-chart-line text-5xl text-green-600 mb-3"></i>
                                <h2 class="text-2xl font-bold">Tableau de bord</h2>
                                <p class="text-gray-600">Bienvenue dans votre espace recruteur</p>
                            </div>
                            <div class="grid md:grid-cols-2 gap-6">
                                <div class="stat-card" onclick="showMesOffres()">
                                    <i class="fas fa-bullhorn text-3xl text-blue-600 mb-2"></i>
                                    <div class="text-2xl font-bold">${offres ? offres.length : 0}</div>
                                    <div class="text-gray-600">Mes offres</div>
                                </div>
                                <div class="stat-card" onclick="showCandidaturesRecues()">
                                    <i class="fas fa-users text-3xl text-green-600 mb-2"></i>
                                    <div class="text-2xl font-bold" id="candidaturesCount">0</div>
                                    <div class="text-gray-600">Candidatures reçues</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('mainContent').innerHTML = html;
            chargerCandidaturesCount();
        }

        async function chargerCandidaturesCount() {
            const { data: offres } = await supabaseClient.from('offres').select('id').eq('entreprise_id', currentUser.id);
            if (offres && offres.length > 0) {
                const offreIds = offres.map(o => o.id);
                const { data: candidatures } = await supabaseClient.from('candidatures').select('id').in('offre_id', offreIds);
                const count = candidatures ? candidatures.length : 0;
                const countEl = document.getElementById('candidaturesCount');
                if (countEl) countEl.innerText = count;
            }
        }

        function showPublierOffre() {
            const html = `
                <div class="dashboard-main">
                    <h2 class="text-2xl font-bold mb-6"><i class="fas fa-plus-circle text-purple-600 mr-2"></i> Publier une offre d'emploi</h2>
                    <form onsubmit="publierOffre(event)">
                        <div class="grid md:grid-cols-2 gap-4">
                            <div class="md:col-span-2"><label class="block text-gray-700 mb-2">Intitulé du poste *</label><input type="text" id="intitule" required class="input-modern"></div>
                            <div><label class="block text-gray-700 mb-2">Nombre de personnes</label><input type="number" id="nbPersonnes" class="input-modern"></div>
                            <div><label class="block text-gray-700 mb-2">Type de contrat *</label>
                                <select id="typeContrat" class="input-modern">
                                    <option>CDI</option><option>CDD</option><option>Intérim</option><option>Stage</option>
                                </select>
                            </div>
                            <div class="md:col-span-2"><label class="block text-gray-700 mb-2">Description courte *</label><textarea id="descriptionCourte" rows="2" required class="input-modern"></textarea></div>
                            <div class="md:col-span-2"><label class="block text-gray-700 mb-2">Description détaillée</label><textarea id="descriptionLongue" rows="4" class="input-modern"></textarea></div>
                            <div><label class="block text-gray-700 mb-2">Niveau d'expérience souhaité</label><input type="text" id="niveauExperience" class="input-modern"></div>
                            <div><label class="block text-gray-700 mb-2">Compétences nécessaires</label><textarea id="competencesRequises" rows="2" class="input-modern"></textarea></div>
                            <div><label class="block text-gray-700 mb-2">Lieu de travail</label><input type="text" id="lieuTravail" class="input-modern"></div>
                            <div><label class="block text-gray-700 mb-2">Horaires</label><input type="text" id="horaires" class="input-modern"></div>
                            <div><label class="block text-gray-700 mb-2">Salaire proposé (TND)</label><input type="number" id="salairePropose" class="input-modern"></div>
                            <div class="md:col-span-2"><label class="block text-gray-700 mb-2">Avantages (transport, repas, primes, assurance, logement...)</label><textarea id="avantages" rows="2" class="input-modern"></textarea></div>
                        </div>
                        <div class="mt-6 flex justify-end">
                            <button type="submit" class="btn-primary"><i class="fas fa-paper-plane mr-2"></i> Publier l'offre</button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('dashboardContent').innerHTML = html;
        }

        async function publierOffre(event) {
            event.preventDefault();
            
            const offreData = {
                entreprise_id: currentUser.id,
                intitule: document.getElementById('intitule').value,
                nombre_personnes: document.getElementById('nbPersonnes').value || 1,
                description_courte: document.getElementById('descriptionCourte').value,
                description_longue: document.getElementById('descriptionLongue').value,
                niveau_experience: document.getElementById('niveauExperience').value,
                competences_requises: document.getElementById('competencesRequises').value,
                lieu_travail: document.getElementById('lieuTravail').value,
                horaires: document.getElementById('horaires').value,
                type_contrat: document.getElementById('typeContrat').value,
                salaire_propose: document.getElementById('salairePropose').value || null,
                avantages: document.getElementById('avantages').value,
                status: 'active',
                created_at: new Date(),
                updated_at: new Date()
            };
            
            const { error } = await supabaseClient.from('offres').insert([offreData]);
            
            if (error) {
                Swal.fire('Erreur', error.message, 'error');
            } else {
                Swal.fire('Succès', 'Offre publiée avec succès', 'success').then(() => showEntrepriseDashboard());
            }
        }

        async function showMesOffres() {
            const { data: offres } = await supabaseClient
                .from('offres')
                .select('*')
                .eq('entreprise_id', currentUser.id)
                .order('created_at', { ascending: false });
            
            let html = `
                <div class="dashboard-main">
                    <h2 class="text-2xl font-bold mb-6"><i class="fas fa-bullhorn text-purple-600 mr-2"></i> Mes offres</h2>
                    <div class="space-y-4">
            `;
            
            if (!offres || offres.length === 0) {
                html += '<p class="text-center text-gray-500 py-8">Vous n\'avez pas encore publié d\'offres.</p>';
                html += '<div class="text-center"><button onclick="showPublierOffre()" class="btn-primary">+ Publier une offre</button></div>';
            } else {
                for (const offre of offres) {
                    html += `
                        <div class="border rounded-lg p-4">
                            <div class="flex justify-between items-start flex-wrap gap-2">
                                <div>
                                    <h3 class="font-bold text-lg">${offre.intitule}</h3>
                                    <p class="text-sm text-gray-500">${offre.lieu_travail || 'Lieu non spécifié'} • ${offre.type_contrat}</p>
                                    <p class="text-xs text-gray-400 mt-1">Publiée le ${new Date(offre.created_at).toLocaleDateString()}</p>
                                    ${offre.salaire_propose ? `<p class="text-sm font-semibold text-green-600">${offre.salaire_propose} TND</p>` : ''}
                                </div>
                                <span class="status-badge ${offre.status === 'active' ? 'status-preselection' : 'status-non-retenu'}">${offre.status === 'active' ? 'Active' : 'Fermée'}</span>
                            </div>
                        </div>
                    `;
                }
            }
            
            html += `</div><div class="mt-6"><button onclick="showEntrepriseDashboard()" class="btn-secondary">← Retour</button></div></div>`;
            document.getElementById('dashboardContent').innerHTML = html;
        }

        async function showCandidaturesRecues() {
            const { data: offres } = await supabaseClient.from('offres').select('id').eq('entreprise_id', currentUser.id);
            
            if (!offres || offres.length === 0) {
                let html = `
                    <div class="dashboard-main">
                        <h2 class="text-2xl font-bold mb-6"><i class="fas fa-inbox text-purple-600 mr-2"></i> Candidatures reçues</h2>
                        <p class="text-center text-gray-500 py-8">Aucune offre publiée pour recevoir des candidatures.</p>
                        <div class="mt-6"><button onclick="showEntrepriseDashboard()" class="btn-secondary">← Retour</button></div>
                    </div>
                `;
                document.getElementById('dashboardContent').innerHTML = html;
                return;
            }
            
            const offreIds = offres.map(o => o.id);
            const { data: candidatures } = await supabaseClient
                .from('candidatures')
                .select('*, offres(intitule, lieu_travail), candidats(nom, prenom, metier_recherche, telephone)')
                .in('offre_id', offreIds)
                .order('date_candidature', { ascending: false });
            
            let html = `
                <div class="dashboard-main">
                    <h2 class="text-2xl font-bold mb-6"><i class="fas fa-inbox text-purple-600 mr-2"></i> Candidatures reçues</h2>
                    <div class="space-y-4">
            `;
            
            if (!candidatures || candidatures.length === 0) {
                html += '<p class="text-center text-gray-500 py-8">Aucune candidature reçue pour le moment.</p>';
            } else {
                for (const cand of candidatures) {
                    html += `
                        <div class="border rounded-lg p-4">
                            <div class="flex justify-between items-start flex-wrap gap-4">
                                <div class="flex-1">
                                    <h3 class="font-bold">${cand.candidats?.prenom || ''} ${cand.candidats?.nom || 'Candidat'}</h3>
                                    <p class="text-sm text-gray-600">Tél: ${cand.candidats?.telephone || '-'}</p>
                                    <p class="text-sm text-gray-600">Poste : ${cand.offres?.intitule || 'Offre'}</p>
                                    <p class="text-sm text-gray-600">Métier : ${cand.candidats?.metier_recherche || 'Non spécifié'}</p>
                                    <p class="text-xs text-gray-500">Reçu le ${new Date(cand.date_candidature).toLocaleDateString()}</p>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="updateCandidatureStatus('${cand.id}', 'preselectionne')" class="px-3 py-1 bg-green-500 text-white rounded-lg text-sm">
                                        <i class="fas fa-check mr-1"></i> Présélectionner
                                    </button>
                                    <button onclick="updateCandidatureStatus('${cand.id}', 'refuse')" class="px-3 py-1 bg-red-500 text-white rounded-lg text-sm">
                                        <i class="fas fa-times mr-1"></i> Refuser
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }
            }
            
            html += `</div><div class="mt-6"><button onclick="showEntrepriseDashboard()" class="btn-secondary">← Retour</button></div></div>`;
            document.getElementById('dashboardContent').innerHTML = html;
        }

        async function updateCandidatureStatus(candidatureId, status) {
            const { error } = await supabaseClient
                .from('candidatures')
                .update({ statut: status, updated_at: new Date() })
                .eq('id', candidatureId);
            
            if (error) {
                Swal.fire('Erreur', error.message, 'error');
            } else {
                Swal.fire('Succès', `Statut mis à jour : ${status === 'preselectionne' ? 'Présélectionné' : 'Refusé'}`, 'success');
                showCandidaturesRecues();
            }
        }

        // ====================================================
        // DASHBOARD ADMIN
        // ====================================================
        async function showAdminDashboard() {
            const { count: candidatsCount } = await supabaseClient.from('candidats').select('*', { count: 'exact', head: true });
            const { count: entreprisesCount } = await supabaseClient.from('entreprises').select('*', { count: 'exact', head: true });
            const { count: offresCount } = await supabaseClient.from('offres').select('*', { count: 'exact', head: true });
            const { count: candidaturesCount } = await supabaseClient.from('candidatures').select('*', { count: 'exact', head: true });
            
            const html = `
                <div class="dashboard-main fade-in">
                    <div class="text-center mb-8">
                        <i class="fas fa-chart-line text-5xl text-purple-600 mb-3"></i>
                        <h2 class="text-2xl font-bold">Administration OctoGo</h2>
                        <p class="text-gray-600">Gestion complète de la plateforme</p>
                    </div>
                    <div class="grid md:grid-cols-4 gap-6">
                        <div class="stat-card">
                            <i class="fas fa-users text-3xl text-blue-600 mb-2"></i>
                            <div class="text-2xl font-bold">${candidatsCount || 0}</div>
                            <div class="text-gray-600">Candidats</div>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-building text-3xl text-green-600 mb-2"></i>
                            <div class="text-2xl font-bold">${entreprisesCount || 0}</div>
                            <div class="text-gray-600">Entreprises</div>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-briefcase text-3xl text-purple-600 mb-2"></i>
                            <div class="text-2xl font-bold">${offresCount || 0}</div>
                            <div class="text-gray-600">Offres</div>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-file-alt text-3xl text-orange-600 mb-2"></i>
                            <div class="text-2xl font-bold">${candidaturesCount || 0}</div>
                            <div class="text-gray-600">Candidatures</div>
                        </div>
                    </div>
                    <div class="mt-8 flex justify-center">
                        <button onclick="logout()" class="btn-secondary">Déconnexion</button>
                    </div>
                </div>
            `;
            document.getElementById('mainContent').innerHTML = html;
        }

        // ====================================================
        // DÉCONNEXION
        // ====================================================
        function logout() {
            currentUser = null;
            currentUserType = null;
            localStorage.removeItem('currentSession');
            showHome();
        }

        // Vérifier la session au chargement
        checkSession();
    </script>
</body>

</html>
