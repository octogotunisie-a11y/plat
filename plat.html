<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OctoGo - Plateforme de Recrutement Professionnel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        /* Animation de chargement */
        
        .loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
        }
        
        .loader {
            text-align: center;
            animation: fadeInUp 0.8s ease-out;
        }
        
        .loader-logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        .loader-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.3));
        }
        
        .loader-text {
            color: white;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-top: 20px;
        }
        
        .loader-dots {
            display: inline-block;
            width: 60px;
            text-align: left;
        }
        
        .loader-dots::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
            display: inline-block;
            width: 0;
            overflow: hidden;
            vertical-align: bottom;
        }
        
        @keyframes dots {
            0%,
            20% {
                width: 0;
            }
            40% {
                width: 0.5em;
            }
            60% {
                width: 1em;
            }
            80%,
            100% {
                width: 1.5em;
            }
        }
        
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.1);
                opacity: 0.9;
            }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* Animations des cartes */
        
        .fade-in {
            animation: fadeIn 0.8s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* Cards professionnelles */
        
        .card-pro {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        
        .card-pro:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15);
        }
        /* Badges */
        
        .badge-gradient {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
        }
        /* Navigation moderne */
        
        .nav-modern {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        /* Boutons */
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-secondary {
            background: white;
            color: #667eea;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            border: 2px solid #667eea;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .btn-secondary:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }
        /* Formulaires */
        
        .input-modern {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 16px;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .input-modern:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        /* Hero section */
        
        .hero-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 30px;
            padding: 60px;
            text-align: center;
            color: white;
        }
        /* Scrollbar personnalisée */
        
         ::-webkit-scrollbar {
            width: 8px;
        }
        
         ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        
         ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }
        /* Form sections */
        
        .form-section-modern {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            border-left: 4px solid #667eea;
        }
        /* Dashboard layout */
        
        .dashboard-sidebar {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }
        
        .dashboard-main {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }
        /* Table styles */
        
        .table-modern {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }
        
        .table-modern th {
            text-align: left;
            padding: 15px;
            background: #f8fafc;
            font-weight: 600;
            color: #4a5568;
        }
        
        .table-modern td {
            padding: 15px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
        }
        /* Stats cards */
        
        .stat-card {
            background: linear-gradient(135deg, #f8fafc 0%, #ffffff 100%);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid #e2e8f0;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        /* Loading animation for page transitions */
        
        .page-transition {
            animation: pageFadeIn 0.5s ease-out;
        }
        
        @keyframes pageFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <!-- Page de chargement -->
    <div class="loader-wrapper" id="loaderWrapper">
        <div class="loader">
            <div class="loader-logo">
                <img src="octogo.png" alt="OctoGo" onerror="this.src='https://via.placeholder.com/120x120?text=OctoGo'">
            </div>
            <div class="loader-text">
                OctoGo<span class="loader-dots"></span>
            </div>
            <p style="color: rgba(255,255,255,0.8); margin-top: 15px;">Plateforme de recrutement professionnel</p>
        </div>
    </div>

    <!-- Contenu principal -->
    <div id="appContent" style="display: none;">
        <!-- Navigation -->
        <nav class="nav-modern sticky top-0 z-50">
            <div class="container mx-auto px-4">
                <div class="flex justify-between items-center py-4">
                    <div class="flex items-center space-x-3">
                        <img src="octogo.png" alt="OctoGo" class="h-12 w-auto" onerror="this.src='https://via.placeholder.com/48x48?text=OG'">
                        <span class="font-bold text-2xl text-gray-800">Octo<span class="text-purple-600">Go</span></span>
                    </div>
                    <div class="hidden md:flex space-x-4">
                        <button onclick="showHome()" class="text-gray-600 hover:text-purple-600 transition px-4 py-2 font-medium">Accueil</button>
                        <button onclick="showLogin('candidat')" class="text-gray-600 hover:text-purple-600 transition px-4 py-2 font-medium">Espace Candidat</button>
                        <button onclick="showLogin('entreprise')" class="text-gray-600 hover:text-purple-600 transition px-4 py-2 font-medium">Espace Entreprise</button>
                        <button onclick="showLogin('admin')" class="text-gray-600 hover:text-purple-600 transition px-4 py-2 font-medium">Administrateur</button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Contenu principal -->
        <div id="mainContent" class="container mx-auto px-4 py-8 page-transition"></div>
    </div>

    <script>
        // Simuler le chargement de la page
        setTimeout(() => {
            const loader = document.getElementById('loaderWrapper');
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
                showHome();
            }, 500);
        }, 2000);

        let currentUser = null;

        // Afficher la page d'accueil professionnelle
        function showHome() {
            const homeHTML = `
                <div class="fade-in">
                    <!-- Hero Section -->
                    <div class="hero-gradient mb-16">
                        <h1 class="text-5xl md:text-6xl font-bold mb-4">Plateforme de Recrutement</h1>
                        <p class="text-xl md:text-2xl mb-8 opacity-95">La solution complète pour l'emploi et le recrutement professionnel</p>
                        <div class="flex justify-center gap-4">
                            <button onclick="showLogin('candidat')" class="bg-white text-purple-600 px-8 py-3 rounded-full font-semibold hover:shadow-lg transition">
                                Je cherche un emploi
                            </button>
                            <button onclick="showLogin('entreprise')" class="bg-purple-700 text-white px-8 py-3 rounded-full font-semibold hover:bg-purple-800 transition">
                                Je recrute
                            </button>
                        </div>
                    </div>
                    
                    <!-- Statistiques -->
                    <div class="grid md:grid-cols-3 gap-8 mb-16">
                        <div class="stat-card">
                            <i class="fas fa-users text-4xl text-purple-600 mb-3"></i>
                            <div class="text-3xl font-bold text-gray-800">500+</div>
                            <div class="text-gray-600">Candidats inscrits</div>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-building text-4xl text-purple-600 mb-3"></i>
                            <div class="text-3xl font-bold text-gray-800">150+</div>
                            <div class="text-gray-600">Entreprises partenaires</div>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-briefcase text-4xl text-purple-600 mb-3"></i>
                            <div class="text-3xl font-bold text-gray-800">1000+</div>
                            <div class="text-gray-600">Offres d'emploi</div>
                        </div>
                    </div>
                    
                    <!-- Services -->
                    <h2 class="text-3xl font-bold text-center mb-12">Nos services</h2>
                    <div class="grid md:grid-cols-3 gap-8">
                        <div class="card-pro p-8 text-center cursor-pointer" onclick="showLogin('candidat')">
                            <div class="w-20 h-20 bg-gradient-to-r from-blue-500 to-purple-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                <i class="fas fa-user-graduate text-white text-3xl"></i>
                            </div>
                            <h3 class="text-2xl font-bold mb-3">Espace Candidat</h3>
                            <p class="text-gray-600">Créez votre CV professionnel, postulez aux offres et suivez vos candidatures</p>
                            <div class="mt-4">
                                <span class="badge-gradient">Gratuit</span>
                            </div>
                        </div>
                        
                        <div class="card-pro p-8 text-center cursor-pointer" onclick="showLogin('entreprise')">
                            <div class="w-20 h-20 bg-gradient-to-r from-green-500 to-teal-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                <i class="fas fa-chart-line text-white text-3xl"></i>
                            </div>
                            <h3 class="text-2xl font-bold mb-3">Espace Entreprise</h3>
                            <p class="text-gray-600">Publiez vos offres, trouvez les meilleurs talents et gérez vos recrutements</p>
                            <div class="mt-4">
                                <span class="badge-gradient">Professionnel</span>
                            </div>
                        </div>
                        
                        <div class="card-pro p-8 text-center cursor-pointer" onclick="showLogin('admin')">
                            <div class="w-20 h-20 bg-gradient-to-r from-purple-500 to-pink-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                <i class="fas fa-chart-pie text-white text-3xl"></i>
                            </div>
                            <h3 class="text-2xl font-bold mb-3">Espace Admin</h3>
                            <p class="text-gray-600">Gérez l'ensemble de la plateforme, analysez les statistiques et validez les profils</p>
                            <div class="mt-4">
                                <span class="badge-gradient">Supervision</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            animatePageTransition(homeHTML);
        }

        // Afficher formulaire de connexion moderne
        function showLogin(type) {
            const loginHTML = `
                <div class="max-w-md mx-auto fade-in">
                    <div class="card-pro p-8">
                        <div class="text-center mb-8">
                            <img src="octogo.png" alt="OctoGo" class="h-16 mx-auto mb-4" onerror="this.style.display='none'">
                            <h2 class="text-3xl font-bold text-gray-800">Connexion</h2>
                            <p class="text-gray-600 mt-2">Espace ${type === 'candidat' ? 'Candidat' : type === 'entreprise' ? 'Entreprise' : 'Administrateur'}</p>
                        </div>
                        
                        <form onsubmit="handleLogin(event, '${type}')">
                            <div class="mb-4">
                                <label class="block text-gray-700 mb-2 font-medium">Email</label>
                                <input type="email" id="loginEmail" required class="input-modern" placeholder="votre@email.com">
                            </div>
                            
                            <div class="mb-6">
                                <label class="block text-gray-700 mb-2 font-medium">Mot de passe</label>
                                <input type="password" id="loginPassword" required class="input-modern" placeholder="••••••••">
                            </div>
                            
                            <button type="submit" class="btn-primary w-full">
                                <i class="fas fa-sign-in-alt mr-2"></i> Se connecter
                            </button>
                        </form>
                        
                        <div class="mt-4 text-center">
                            <button onclick="showRegister('${type}')" class="text-purple-600 hover:underline">
                                Pas encore de compte ? S'inscrire
                            </button>
                        </div>
                        
                        <button onclick="showHome()" class="mt-4 text-gray-500 hover:text-gray-700 text-sm w-full">
                            ← Retour à l'accueil
                        </button>
                    </div>
                </div>
            `;
            animatePageTransition(loginHTML);
        }

        // Animation de transition entre les pages
        function animatePageTransition(html) {
            const mainContent = document.getElementById('mainContent');
            mainContent.style.opacity = '0';
            mainContent.style.transform = 'translateY(20px)';
            setTimeout(() => {
                mainContent.innerHTML = html;
                mainContent.style.transition = 'all 0.3s ease';
                mainContent.style.opacity = '1';
                mainContent.style.transform = 'translateY(0)';
            }, 200);
        }

        // Afficher formulaire d'inscription CANDIDAT complet
        function showRegisterCandidat() {
            const registerHTML = `
                <div class="max-w-5xl mx-auto fade-in">
                    <div class="card-pro p-8">
                        <div class="text-center mb-6">
                            <h2 class="text-3xl font-bold text-gray-800">Inscription Candidat</h2>
                            <p class="text-gray-600">Créez votre profil professionnel facilement</p>
                        </div>
                        
                        <form onsubmit="registerCandidat(event)" enctype="multipart/form-data">
                            <!-- Section 1: Informations personnelles -->
                            <div class="form-section-modern">
                                <h3 class="text-xl font-bold mb-4 text-gray-800"><i class="fas fa-user-circle text-purple-600 mr-2"></i> Informations personnelles</h3>
                                <div class="grid md:grid-cols-2 gap-4">
                                    <div><label class="block text-gray-700 mb-2 font-medium">Nom *</label><input type="text" id="nom" required class="input-modern"></div>
                                    <div><label class="block text-gray-700 mb-2 font-medium">Prénom *</label><input type="text" id="prenom" required class="input-modern"></div>
                                    <div><label class="block text-gray-700 mb-2 font-medium">Date de naissance *</label><input type="date" id="dateNaissance" required class="input-modern"></div>
                                    <div><label class="block text-gray-700 mb-2 font-medium">Téléphone *</label><input type="tel" id="telephone" required class="input-modern"></div>
                                    <div><label class="block text-gray-700 mb-2 font-medium">Email *</label><input type="email" id="email" required class="input-modern"></div>
                                    <div><label class="block text-gray-700 mb-2 font-medium">Mot de passe *</label><input type="password" id="password" required class="input-modern"></div>
                                    <div class="md:col-span-2"><label class="block text-gray-700 mb-2 font-medium">Adresse complète</label><input type="text" id="adresse" class="input-modern"></div>
                                    <div><label class="block text-gray-700 mb-2 font-medium">Ville / Région *</label><input type="text" id="ville" required class="input-modern"></div>
                                    <div><label class="block text-gray-700 mb-2 font-medium">Situation familiale</label>
                                        <select id="situation" class="input-modern"><option value="">Sélectionnez</option><option>Célibataire</option><option>Marié(e)</option><option>Divorcé(e)</option><option>Veuf/Veuve</option></select>
                                    </div>
                                    <div><label class="block text-gray-700 mb-2 font-medium">Niveau d'étude</label>
                                        <select id="niveauEtude" class="input-modern"><option value="">Sélectionnez</option><option>Primaire</option><option>Secondaire</option><option>Bac</option><option>Bac+2</option><option>Bac+3</option><option>Bac+5</option><option>Doctorat</option></select>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Section 2: Données professionnelles -->
                            <div class="form-section-modern">
                                <h3 class="text-xl font-bold mb-4 text-gray-800"><i class="fas fa-briefcase text-purple-600 mr-2"></i> Données professionnelles</h3>
                                <div class="grid md:grid-cols-2 gap-4">
                                    <div><label class="block text-gray-700 mb-2 font-medium">Métier recherché *</label><input type="text" id="metier" required class="input-modern"></div>
                                    <div><label class="block text-gray-700 mb-2 font-medium">Secteur d'activité *</label>
                                        <select id="secteur" required class="input-modern"><option value="">Sélectionnez</option><option>Industrie</option><option>Service</option><option>Logistique</option><option>Hôtellerie</option><option>Sécurité</option><option>Nettoyage</option><option>Restauration</option></select>
                                    </div>
                                    <div class="md:col-span-2"><label class="block text-gray-700 mb-2 font-medium">Expériences professionnelles</label><textarea id="experiences" rows="4" class="input-modern" placeholder="Décrivez vos expériences professionnelles..."></textarea></div>
                                    <div class="md:col-span-2"><label class="block text-gray-700 mb-2 font-medium">Compétences</label><textarea id="competences" rows="3" class="input-modern" placeholder="Listez vos compétences..."></textarea></div>
                                    <div><label class="block text-gray-700 mb-2 font-medium">Permis de conduire</label>
                                        <select id="permis" class="input-modern"><option value="Non">Non</option><option>Oui - B</option><option>Oui - C</option><option>Oui - D</option></select>
                                    </div>
                                    <div><label class="block text-gray-700 mb-2 font-medium">Disponibilité</label>
                                        <select id="disponibilite" class="input-modern"><option>Immédiate</option><option>1 semaine</option><option>2 semaines</option><option>1 mois</option></select>
                                    </div>
                                    <div><label class="block text-gray-700 mb-2 font-medium">Mobilité géographique</label>
                                        <select id="mobilite" class="input-modern"><option>Locale</option><option>Régionale</option><option>Nationale</option><option>Internationale</option></select>
                                    </div>
                                    <div><label class="block text-gray-700 mb-2 font-medium">Salaire souhaité (TND/mois)</label><input type="number" id="salaire" class="input-modern" placeholder="Ex: 1500"></div>
                                </div>
                            </div>
                            
                            <!-- Section 3: Documents -->
                            <div class="form-section-modern">
                                <h3 class="text-xl font-bold mb-4 text-gray-800"><i class="fas fa-file-alt text-purple-600 mr-2"></i> Documents</h3>
                                <div class="grid md:grid-cols-2 gap-4">
                                    <div><label class="block text-gray-700 mb-2 font-medium">CV (PDF/Word)</label><input type="file" id="cvFile" accept=".pdf,.doc,.docx" class="input-modern"></div>
                                    <div><label class="block text-gray-700 mb-2 font-medium">Photo de profil</label><input type="file" id="photo" accept="image/*" class="input-modern"></div>
                                    <div><label class="block text-gray-700 mb-2 font-medium">Carte d'identité</label><input type="file" id="cin" accept=".pdf,.jpg,.png" class="input-modern"></div>
                                    <div><label class="block text-gray-700 mb-2 font-medium">Diplômes</label><input type="file" id="diplomes" accept=".pdf" multiple class="input-modern"></div>
                                    <div><label class="block text-gray-700 mb-2 font-medium">Certificats</label><input type="file" id="certificats" accept=".pdf" multiple class="input-modern"></div>
                                    <div><label class="block text-gray-700 mb-2 font-medium">Attestations de travail</label><input type="file" id="attestations" accept=".pdf" multiple class="input-modern"></div>
                                </div>
                            </div>
                            
                            <div class="flex justify-between mt-8">
                                <button type="button" onclick="showHome()" class="btn-secondary">Annuler</button>
                                <button type="submit" class="btn-primary"><i class="fas fa-check-circle mr-2"></i> S'inscrire et créer mon CV</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
            animatePageTransition(registerHTML);
        }

        // Afficher formulaire d'inscription ENTREPRISE complet
        function showRegisterEntreprise() {
            const registerHTML = `
                <div class="max-w-4xl mx-auto fade-in">
                    <div class="card-pro p-8">
                        <div class="text-center mb-6">
